name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this issue is still relevant, please leave a comment or remove the stale label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity. If you believe
            this is still relevant, please reopen it with updated information.
          stale-issue-label: 'stale'
          days-before-stale: 90
          days-before-close: 14
          exempt-issue-labels: 'prio: critical,prio: high,💎 Bounty,🙋 Bounty claim'
          operations-per-run: 30
          days-before-pr-stale: -1
          days-before-pr-close: -1
